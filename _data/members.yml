pi:
  - name: Prof. Munish Kumar Chandel
    title: Associate Professor
    image: prof_pic.jpg
    email: munish.chandel@iitb.ac.in
    scholar: "https://scholar.google.com/citations?user=na0DARMAAAAJ"
    orcid: ""
    bio: >
      Associate Professor, Centre for Environmental Science and Engineering, IIT Bombay.
      Ph.D., IIT Delhi (2006). M.E., NIT Allahabad (2001). B.Tech., NIT Hamirpur (1999).
      Young Faculty Award, IIT Bombay (2013). Fellow, International Energy Agency (2007).
      French Government EGIDE Scholar (2004). Swiss Agency (IDRC) travel grant (2006).
      Research interests: solid waste management, biogas and anaerobic digestion, wastewater
      reuse and water-energy nexus, urban transport emissions, carbon capture and storage,
      and chemical looping combustion.

